<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1350" viewBox="0 0 1400 1350" font-family="ui-sans-serif,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#d97706"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1400" height="1350" fill="#ffffff"/>

  <!-- ======================= TITLE ======================= -->
  <text x="70" y="58" font-size="28" font-weight="700" fill="#0f172a">memvine <tspan font-weight="400" fill="#94a3b8">· architecture</tspan></text>
  <text x="70" y="84" font-size="14" fill="#64748b">Git-native memory for coding agents — memories live in the repo, sync via git, and expire when the code changes.</text>
  <text x="1330" y="58" font-size="12" fill="#94a3b8" text-anchor="end">v0.1 · MIT · no LLM calls · no servers</text>

  <!-- ======================= BAND 1: AGENTS ======================= -->
  <text x="70" y="130" font-size="11" font-weight="600" letter-spacing="2" fill="#94a3b8">CODING AGENTS</text>
  <text x="1120" y="130" font-size="11" font-weight="600" letter-spacing="2" fill="#94a3b8">HUMANS</text>

  <g>
    <rect x="70" y="142" width="220" height="54" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="180" y="166" font-size="15" font-weight="600" fill="#3730a3" text-anchor="middle">Claude Code</text>
    <text x="180" y="184" font-size="11" fill="#6d28d9" text-anchor="middle">via MCP</text>

    <rect x="314" y="142" width="220" height="54" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="424" y="166" font-size="15" font-weight="600" fill="#3730a3" text-anchor="middle">Cursor</text>
    <text x="424" y="184" font-size="11" fill="#6d28d9" text-anchor="middle">via MCP</text>

    <rect x="558" y="142" width="220" height="54" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="668" y="166" font-size="15" font-weight="600" fill="#3730a3" text-anchor="middle">Copilot / any MCP agent</text>
    <text x="668" y="184" font-size="11" fill="#6d28d9" text-anchor="middle">via MCP</text>

    <rect x="1120" y="142" width="210" height="54" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-dasharray="5 4"/>
    <text x="1225" y="166" font-size="15" font-weight="600" fill="#334155" text-anchor="middle">You · terminal</text>
    <text x="1225" y="184" font-size="11" fill="#64748b" text-anchor="middle">and scripts / CI hooks</text>
  </g>

  <!-- arrows agents -> doors -->
  <path d="M 180 196 L 330 244" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 424 196 L 424 244" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 668 196 L 520 244" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1225 196 L 1225 244" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ======================= BAND 2: DOORS ======================= -->
  <g>
    <rect x="180" y="248" width="490" height="152" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="204" y="280" font-size="16" font-weight="700" fill="#1e40af">MCP server <tspan font-weight="400" font-size="12" fill="#3b82f6">mcp.ts · stdio</tspan></text>
    <text x="204" y="301" font-size="12" fill="#475569">Four tools. All judgment stays with the calling agent —</text>
    <text x="204" y="318" font-size="12" fill="#475569">memvine itself never calls an LLM.</text>
    <rect x="204" y="334" width="96" height="30" rx="15" fill="#dbeafe"/>
    <text x="252" y="354" font-size="12.5" font-weight="600" fill="#1e40af" text-anchor="middle">recall</text>
    <rect x="312" y="334" width="112" height="30" rx="15" fill="#dbeafe"/>
    <text x="368" y="354" font-size="12.5" font-weight="600" fill="#1e40af" text-anchor="middle">remember</text>
    <rect x="436" y="334" width="92" height="30" rx="15" fill="#dbeafe"/>
    <text x="482" y="354" font-size="12.5" font-weight="600" fill="#1e40af" text-anchor="middle">revise</text>
    <rect x="540" y="334" width="112" height="30" rx="15" fill="#dbeafe"/>
    <text x="596" y="354" font-size="12.5" font-weight="600" fill="#1e40af" text-anchor="middle">check_stale</text>

    <rect x="1010" y="248" width="320" height="152" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="1034" y="280" font-size="16" font-weight="700" fill="#1e40af">CLI <tspan font-weight="400" font-size="12" fill="#3b82f6">cli.ts</tspan></text>
    <text x="1034" y="301" font-size="12" fill="#475569">The human door — same engines underneath.</text>
    <text x="1034" y="338" font-size="13" font-weight="600" fill="#1e40af">init · add · list</text>
    <text x="1034" y="360" font-size="13" font-weight="600" fill="#1e40af">stale · compile · serve</text>
  </g>

  <!-- rail doors -> engines -->
  <path d="M 425 400 L 425 428" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
  <path d="M 1170 400 L 1170 428" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
  <path d="M 240 428 L 1170 428" stroke="#cbd5e1" stroke-width="1.5" fill="none"/>
  <path d="M 240 428 L 240 458" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 700 428 L 700 458" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1160 428 L 1160 458" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ======================= BAND 3: ENGINES ======================= -->
  <text x="70" y="452" font-size="11" font-weight="600" letter-spacing="2" fill="#94a3b8">ENGINES</text>

  <g>
    <rect x="90" y="462" width="380" height="150" rx="14" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="114" y="494" font-size="16" font-weight="700" fill="#115e59">Store <tspan font-weight="400" font-size="12" fill="#0d9488">store.ts · schema.ts</tspan></text>
    <text x="114" y="521" font-size="12.5" fill="#334155">Reads &amp; writes memory files with validated</text>
    <text x="114" y="539" font-size="12.5" fill="#334155">frontmatter. Finds relevant memories by</text>
    <text x="114" y="557" font-size="12.5" fill="#334155">matching your working path against each</text>
    <text x="114" y="575" font-size="12.5" fill="#334155">memory's <tspan font-weight="600">scope</tspan> globs. Shared vs local.</text>

    <rect x="510" y="462" width="380" height="150" rx="14" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="534" y="494" font-size="16" font-weight="700" fill="#115e59">Staleness <tspan font-weight="400" font-size="12" fill="#0d9488">staleness.ts · git.ts</tspan></text>
    <text x="534" y="521" font-size="12.5" fill="#334155">The differentiator, and it's a git query:</text>
    <text x="534" y="541" font-size="12.5" font-weight="600" fill="#0f766e" font-family="ui-monospace,Menlo,monospace">git diff learned_commit..HEAD</text>
    <text x="534" y="561" font-size="12.5" fill="#334155">If changed files hit a memory's scope, the</text>
    <text x="534" y="579" font-size="12.5" fill="#334155">ground moved → memory flagged <tspan font-weight="700" fill="#d97706">stale</tspan>.</text>

    <rect x="930" y="462" width="380" height="150" rx="14" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="954" y="494" font-size="16" font-weight="700" fill="#115e59">Digest compiler <tspan font-weight="400" font-size="12" fill="#0d9488">compile.ts</tspan></text>
    <text x="954" y="521" font-size="12.5" fill="#334155">Curates the best active memories into a</text>
    <text x="954" y="539" font-size="12.5" fill="#334155">marked block inside CLAUDE.md / AGENTS.md,</text>
    <text x="954" y="557" font-size="12.5" fill="#334155">within native startup budgets (~25KB) — so</text>
    <text x="954" y="575" font-size="12.5" fill="#334155">even non-MCP agents benefit.</text>
  </g>

  <!-- arrows engines -> data -->
  <path d="M 280 612 L 280 660" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 700 612 L 700 636 L 420 636 L 420 660" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1120 612 L 1120 660" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ======================= BAND 4: DATA ======================= -->
  <text x="70" y="654" font-size="11" font-weight="600" letter-spacing="2" fill="#94a3b8">THE STORE</text>

  <g>
    <!-- .memvine store card -->
    <rect x="90" y="664" width="560" height="230" rx="14" fill="#fffbeb" stroke="#fde68a"/>
    <text x="114" y="696" font-size="16" font-weight="700" fill="#92400e" font-family="ui-monospace,Menlo,monospace">.memvine/</text>
    <text x="114" y="726" font-size="13" fill="#78350f" font-family="ui-monospace,Menlo,monospace">├─ config.json</text>
    <text x="114" y="748" font-size="13" fill="#78350f" font-family="ui-monospace,Menlo,monospace">├─ memories/   <tspan fill="#16a34a" font-family="ui-sans-serif,-apple-system,'Segoe UI',sans-serif" font-size="12">committed · shared</tspan></text>
    <text x="114" y="770" font-size="13" fill="#78350f" font-family="ui-monospace,Menlo,monospace">│   └─ mem_7f3a2b9c.md</text>
    <text x="114" y="792" font-size="13" fill="#78350f" font-family="ui-monospace,Menlo,monospace">└─ local/      <tspan fill="#64748b" font-family="ui-sans-serif,-apple-system,'Segoe UI',sans-serif" font-size="12">gitignored · personal</tspan></text>

    <!-- frontmatter sample -->
    <rect x="392" y="702" width="238" height="176" rx="10" fill="#ffffff" stroke="#fde68a"/>
    <text x="408" y="726" font-size="11.5" fill="#94a3b8" font-family="ui-monospace,Menlo,monospace">--- frontmatter ---</text>
    <text x="408" y="746" font-size="11.5" fill="#78350f" font-family="ui-monospace,Menlo,monospace">kind: semantic</text>
    <text x="408" y="764" font-size="11.5" fill="#78350f" font-family="ui-monospace,Menlo,monospace">tags: [test, auth]</text>
    <text x="408" y="782" font-size="11.5" fill="#78350f" font-family="ui-monospace,Menlo,monospace">scope: [src/auth/**]</text>
    <text x="408" y="800" font-size="11.5" fill="#78350f" font-family="ui-monospace,Menlo,monospace">learned_commit: a1b4c9e</text>
    <text x="408" y="818" font-size="11.5" fill="#78350f" font-family="ui-monospace,Menlo,monospace">status: active</text>
    <text x="408" y="836" font-size="11.5" fill="#78350f" font-family="ui-monospace,Menlo,monospace">confidence: high</text>
    <text x="408" y="860" font-size="11.5" fill="#b45309" font-family="ui-monospace,Menlo,monospace">+ the memory, in markdown</text>

    <!-- git sync card -->
    <rect x="710" y="664" width="330" height="230" rx="14" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="734" y="696" font-size="16" font-weight="700" fill="#334155">Git is the sync</text>
    <text x="734" y="722" font-size="12.5" fill="#475569">No cloud. No account. No subscription.</text>
    <text x="734" y="740" font-size="12.5" fill="#475569">Memories never leave your infrastructure.</text>
    <rect x="734" y="760" width="120" height="32" rx="16" fill="#e2e8f0"/>
    <text x="794" y="781" font-size="13" font-weight="600" fill="#334155" text-anchor="middle">git push</text>
    <rect x="894" y="760" width="120" height="32" rx="16" fill="#e2e8f0"/>
    <text x="954" y="781" font-size="13" font-weight="600" fill="#334155" text-anchor="middle">git pull</text>
    <text x="734" y="826" font-size="12.5" fill="#475569">History, blame, review, rollback, and</text>
    <text x="734" y="844" font-size="12.5" fill="#475569">merging — all inherited from git, for free.</text>
    <text x="734" y="874" font-size="12.5" font-weight="600" fill="#3730a3">→ teammates' agents recall your memories</text>

    <!-- digest output card -->
    <rect x="1100" y="664" width="230" height="230" rx="14" fill="#fafaf9" stroke="#e7e5e4"/>
    <text x="1124" y="696" font-size="15" font-weight="700" fill="#44403c">Compiled digest</text>
    <text x="1124" y="722" font-size="13" font-weight="600" fill="#57534e" font-family="ui-monospace,Menlo,monospace">CLAUDE.md</text>
    <text x="1124" y="742" font-size="13" font-weight="600" fill="#57534e" font-family="ui-monospace,Menlo,monospace">AGENTS.md</text>
    <text x="1124" y="772" font-size="12" fill="#78716c">Top memories, rendered</text>
    <text x="1124" y="790" font-size="12" fill="#78716c">between markers, inside</text>
    <text x="1124" y="808" font-size="12" fill="#78716c">the ~25KB startup budget.</text>
    <text x="1124" y="838" font-size="12" fill="#78716c">Read natively by agents</text>
    <text x="1124" y="856" font-size="12" fill="#78716c">that don't speak MCP.</text>
  </g>

  <!-- store <-> git arrow -->
  <path d="M 650 780 L 706 780" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- ======================= BAND 5: MEMORY TYPES ======================= -->
  <text x="70" y="948" font-size="11" font-weight="600" letter-spacing="2" fill="#94a3b8">MEMORY TYPES — MODELED ON HUMAN MEMORY</text>

  <g>
    <rect x="70" y="962" width="305" height="122" rx="14" fill="#faf5ff" stroke="#e9d5ff"/>
    <text x="92" y="992" font-size="15" font-weight="700" fill="#6b21a8">episodic <tspan font-weight="400" font-size="12" fill="#9333ea">· what happened</tspan></text>
    <text x="92" y="1016" font-size="12" fill="#475569">Events and outcomes from past</text>
    <text x="92" y="1033" font-size="12" fill="#475569">sessions. "We tried X; it failed."</text>
    <text x="92" y="1062" font-size="11.5" font-weight="600" fill="#16a34a">never stales — history stays true</text>

    <rect x="388" y="962" width="305" height="122" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="410" y="992" font-size="15" font-weight="700" fill="#1e40af">semantic <tspan font-weight="400" font-size="12" fill="#3b82f6">· what is true</tspan></text>
    <text x="410" y="1016" font-size="12" fill="#475569">Facts, decisions, and conventions</text>
    <text x="410" y="1033" font-size="12" fill="#475569">about the codebase.</text>
    <text x="410" y="1062" font-size="11.5" font-weight="600" fill="#d97706">stales when its code changes</text>

    <rect x="706" y="962" width="305" height="122" rx="14" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="728" y="992" font-size="15" font-weight="700" fill="#115e59">procedural <tspan font-weight="400" font-size="12" fill="#0d9488">· how to</tspan></text>
    <text x="728" y="1016" font-size="12" fill="#475569">Runbooks and workflows.</text>
    <text x="728" y="1033" font-size="12" fill="#475569">"To deploy: stage, verify, promote."</text>
    <text x="728" y="1062" font-size="11.5" font-weight="600" fill="#d97706">stales when its code changes</text>

    <rect x="1024" y="962" width="305" height="122" rx="14" fill="#fffbeb" stroke="#fde68a"/>
    <text x="1046" y="992" font-size="15" font-weight="700" fill="#92400e">prospective <tspan font-weight="400" font-size="12" fill="#d97706">· do later</tspan></text>
    <text x="1046" y="1016" font-size="12" fill="#475569">Deferred intents that wait for a</text>
    <text x="1046" y="1033" font-size="12" fill="#475569">condition. "When v2 ships, delete X."</text>
    <text x="1046" y="1062" font-size="11.5" font-weight="600" fill="#64748b">archived once fulfilled</text>
  </g>

  <!-- ======================= BAND 6: LIFECYCLE ======================= -->
  <text x="70" y="1138" font-size="11" font-weight="600" letter-spacing="2" fill="#94a3b8">MEMORY LIFECYCLE</text>
  <rect x="70" y="1152" width="1260" height="150" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>

  <!-- active pill -->
  <rect x="130" y="1200" width="130" height="40" rx="20" fill="#f0fdf4" stroke="#86efac"/>
  <circle cx="156" cy="1220" r="5" fill="#16a34a"/>
  <text x="170" y="1225" font-size="14" font-weight="700" fill="#166534">active</text>

  <!-- arrow to stale -->
  <path d="M 260 1220 L 480 1220" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrowAmber)"/>
  <text x="370" y="1206" font-size="11.5" fill="#b45309" text-anchor="middle">scoped code changes (semantic · procedural)</text>

  <!-- stale pill -->
  <rect x="484" y="1200" width="120" height="40" rx="20" fill="#fffbeb" stroke="#fcd34d"/>
  <circle cx="510" cy="1220" r="5" fill="#d97706"/>
  <text x="524" y="1225" font-size="14" font-weight="700" fill="#92400e">stale</text>

  <!-- arrow revalidate back to active (curved) -->
  <path d="M 500 1200 C 460 1160, 300 1160, 264 1196" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="382" y="1162" font-size="11.5" fill="#15803d" text-anchor="middle">agent re-checks — still true</text>

  <!-- arrow to superseded -->
  <path d="M 604 1220 L 830 1220" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="717" y="1206" font-size="11.5" fill="#64748b" text-anchor="middle">contradicted — new memory supersedes</text>

  <!-- superseded pill -->
  <rect x="834" y="1200" width="170" height="40" rx="20" fill="#f1f5f9" stroke="#cbd5e1"/>
  <circle cx="860" cy="1220" r="5" fill="#64748b"/>
  <text x="874" y="1225" font-size="14" font-weight="700" fill="#475569">superseded</text>

  <!-- arrow to archived -->
  <path d="M 1004 1220 L 1140 1220" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="1072" y="1206" font-size="11.5" fill="#64748b" text-anchor="middle">no longer applies</text>

  <!-- archived pill -->
  <rect x="1144" y="1200" width="130" height="40" rx="20" fill="#fafafa" stroke="#e5e5e5"/>
  <circle cx="1170" cy="1220" r="5" fill="#a3a3a3"/>
  <text x="1184" y="1225" font-size="14" font-weight="700" fill="#737373">archived</text>

  <text x="130" y="1278" font-size="12" fill="#64748b">Nothing is silently deleted — every transition leaves a pointer, and the full history of what the project "believed" stays in git.</text>
</svg>
